<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Signal Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #fff; margin: 0; padding: 10px; touch-action: manipulation; }
        .container { max-width: 400px; margin: auto; }
        .video-wrapper { position: relative; width: 100%; height: 250px; overflow: hidden; border-radius: 8px; border: 2px solid #444; }
        #video { width: 100%; height: 100%; object-fit: cover; background: #000; }
        .reticle { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; border: 3px dashed #ff0000; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn { padding: 15px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; font-size: 14px; }
        #debug-log { background: #000; color: #0f0; font-family: monospace; font-size: 11px; height: 60px; overflow-y: scroll; padding: 5px; margin-top: 10px; border: 1px solid #444; }
        #alert-box { display: none; background: #dc3545; padding: 15px; font-size: 18px; margin-top: 10px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>
    <div class="controls">
        <button class="btn" style="background:#2eb85c" onclick="startTracking()">Start</button>
        <button class="btn" style="background:#e55353" onclick="location.reload()">Stop</button>
        <button class="btn" style="background:#555" id="muteBtn" onclick="toggleMute()">Mute: OFF</button>
        <button class="btn" style="background:#f39c12" onclick="resetTracker()">Reset</button>
    </div>
    <div id="alert-box">⚠️ SIGNAL CHANGED!</div>
    <div id="debug-log">Ready...</div>
</div>

<script>
    const video = document.getElementById('video'), canvas = document.createElement('canvas'), ctx = canvas.getContext('2d');
    const log = document.getElementById('debug-log'), alertBox = document.getElementById('alert-box');
    let isTracking = false, isMuted = false, wasRedDetected = false;

    async function startTracking() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = stream;
            isTracking = true;
            scan();
        } catch (e) { alert("Camera Error: " + e.message); }
    }

    function scan() {
        if (!isTracking) return;
        ctx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight);
        const imgData = ctx.getImageData(video.videoWidth/2 - 25, video.videoHeight/2 - 25, 50, 50).data;
        let r=0, g=0, b=0;
        for (let i = 0; i < imgData.length; i += 4) { r += imgData[i]; g += imgData[i+1]; b += imgData[i+2]; }
        r /= (imgData.length/4); g /= (imgData.length/4); b /= (imgData.length/4);

        log.innerHTML = `R:${Math.round(r)} G:${Math.round(g)} B:${Math.round(b)} | ${wasRedDetected?'RED':'OTHER'}`;

        let isRed = (r > 70 && (r - g) > 30);
        if (isRed && !wasRedDetected) { wasRedDetected = true; alertBox.style.display = 'none'; }
        else if (!isRed && wasRedDetected) { wasRedDetected = false; triggerAlert(); }
        requestAnimationFrame(scan);
    }

    function triggerAlert() {
        alertBox.style.display = 'block';
        if (!isMuted) speechSynthesis.speak(new SpeechSynthesisUtterance("Signal changed"));
    }

    function resetTracker() { alertBox.style.display = 'none'; wasRedDetected = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('muteBtn').innerText = isMuted ? "Mute: ON" : "Mute: OFF"; }
</script>
</body>
</html>
