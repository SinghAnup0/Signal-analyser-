<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Off Detector</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            background-color: #121214;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1c1c24;
            padding: 20px;
            border-radius: 12px;
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        #video {
            width: 100%;
            border-radius: 8px;
            background: #000;
        }
        /* Target circle for aiming at the LED */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 3px dashed #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }
        .start { background: #2eb85c; color: white; }
        .stop { background: #e55353; color: white; }
        
        #alert-box {
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            background-color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simple Signal Detector</h2>
    <p>Aim the blue circle directly at the LED light.</p>
    
    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <div>
        <button class="btn start" id="startBtn" onclick="startApp()">Start</button>
        <button class="btn stop" id="stopBtn" onclick="stopApp()" disabled>Stop</button>
    </div>

    <div id="alert-box">Status: Ready</div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const alertBox = document.getElementById('alert-box');
    const alertSound = document.getElementById('alertSound');

    let isRunning = false;
    let streamRef = null;
    let animationId = null;
    
    // Memory tracking
    let lastState = "STARTING"; 

    async function startApp() {
        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        alertBox.innerText = "Initializing Camera...";
        
        try {
            streamRef = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
            video.srcObject = streamRef;
            alertBox.innerText = "Monitoring Light...";
            loop();
        } catch (err) {
            alertBox.innerText = "Camera Error";
        }
    }

    function stopApp() {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        if (streamRef) streamRef.getTracks().forEach(track => track.stop());
        cancelAnimationFrame(animationId);
        alertBox.innerText = "Stopped";
        alertBox.style.backgroundColor = "#333";
    }

    function loop() {
        if (!isRunning) return;

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Read center pixels
            const imgData = ctx.getImageData(canvas.width/2 - 5, canvas.height/2 - 5, 10, 10).data;
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < imgData.length; i += 4) {
                r += imgData[i]; g += imgData[i+1]; b += imgData[i+2];
            }
            r /= (imgData.length/4); g /= (imgData.length/4); b /= (imgData.length/4);

            checkColor(r, g, b);
        }
        animationId = requestAnimationFrame(loop);
    }

    function checkColor(r, g, b) {
        let currentState = "DARK"; // Default if no bright light is seen

        // Simple thresholds for bright LED colors
        if (r > 130 && g < 80) {
            currentState = "RED";
        } else if (g > 130 && r < 100) {
            currentState = "GREEN";
        } else if (r > 140 && g > 120) {
            currentState = "YELLOW";
        }

        // IF THE STATE CHANGES (e.g., RED goes to DARK)
        if (currentState !== lastState) {
            triggerAlert(lastState, currentState);
            lastState = currentState;
        }
    }

    function triggerAlert(oldState, newState) {
        // Play audio beep
        alertSound.currentTime = 0;
        alertSound.play().catch(() => {});

        let message = "";
        
        // Custom message logic focusing on changes/going dark
        if (newState === "DARK") {
            alertBox.style.backgroundColor = "#555";
            message = `⚠️ SIGNAL WENT OFF (Was ${oldState})`;
        } else {
            if (newState === "RED") alertBox.style.backgroundColor = "#dc3545";
            if (newState === "YELLOW") alertBox.style.backgroundColor = "#ffc107";
            if (newState === "GREEN") alertBox.style.backgroundColor = "#28a745";
            message = `👉 CHANGED TO ${newState}`;
        }

        alertBox.innerText = message;

        // Speak the alert out loud
        let speech = new SpeechSynthesisUtterance(message);
        window.speechSynthesis.speak(speech);
    }
</script>
</body>
</html>
