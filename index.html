<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stable Signal Tracker v2.0</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121214;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #1c1c24;
            padding: 20px;
            border-radius: 12px;
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        #video {
            width: 100%;
            border: 2px solid #444;
            border-radius: 8px;
            background-color: #000;
        }
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 35px;
            height: 35px;
            border: 2px dashed #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .btn {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 20px;
        }
        .start { background-color: #2eb85c; color: white; }
        .stop { background-color: #e55353; color: white; }
        .btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        #alert-box {
            font-size: 24px;
            font-weight: bold;
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Stable Signal Tracker</h2>
    <p>Awaiting steady light changes. Ignores camera noise.</p>
    
    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <div>
        <button class="btn start" id="startBtn" onclick="startTracking()">Start</button>
        <button class="btn stop" id="stopBtn" onclick="stopTracking()" disabled>Stop</button>
    </div>

    <div id="alert-box"></div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const alertBox = document.getElementById('alert-box');
    const alertSound = document.getElementById('alertSound');

    let isTracking = false;
    let streamRef = null;
    let animationFrameId = null;
    
    // --- STABILITY FILTER LOGIC ---
    let currentSignalState = "DARK"; // The current confirmed state
    let candidateState = "DARK";     // What the camera *thinks* it sees right now
    let stabilityFramesCounter = 0;   // How many frames the candidate color has lasted
    const REQUIRED_STABLE_FRAMES = 15; // Must look exactly the same for 15 frames (~250ms) to trigger

    async function startTracking() {
        if (isTracking) return;
        isTracking = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;

        try {
            streamRef = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment' } 
            });
            video.srcObject = streamRef;
            analyzeLoop();
        } catch (err) {
            alert("Camera error: " + err.message);
            stopTracking();
        }
    }

    function stopTracking() {
        isTracking = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        alertBox.style.display = 'none';
        alertSound.pause();
        
        if (streamRef) streamRef.getTracks().forEach(track => track.stop());
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
    }

    function analyzeLoop() {
        if (!isTracking) return;

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const size = 12;
            const startX = Math.floor(canvas.width / 2) - 6;
            const startY = Math.floor(canvas.height / 2) - 6;
            const imgData = ctx.getImageData(startX, startY, size, size).data;
            
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < imgData.length; i += 4) {
                r += imgData[i]; g += imgData[i+1]; b += imgData[i+2];
            }
            r /= (imgData.length / 4);
            g /= (imgData.length / 4);
            b /= (imgData.length / 4);

            filterNoise(r, g, b);
        }
        animationFrameId = requestAnimationFrame(analyzeLoop);
    }

    function filterNoise(r, g, b) {
        let immediateDetectedState = "DARK";

        // Color boundaries for bright LED aspects
        if (r > 140 && g < 75 && b < 75) {
            immediateDetectedState = "RED";
        } else if (g > 140 && r < 95 && b < 120) {
            immediateDetectedState = "GREEN";
        } else if (r > 150 && g > 125 && b < 70) {
            immediateDetectedState = (r + g > 420) ? "DOUBLE YELLOW" : "YELLOW";
        }

        // --- Filter Core Logic ---
        if (immediateDetectedState === candidateState) {
            // The color is holding steady! Increment frame counter.
            stabilityFramesCounter++;
            
            // If it passes our safety check threshold
            if (stabilityFramesCounter >= REQUIRED_STABLE_FRAMES) {
                // Check if this stable color is completely different from our locked state
                if (candidateState !== currentSignalState) {
                    triggerAlert(currentSignalState, candidateState);
                    currentSignalState = candidateState; // Lock in the new state
                }
            }
        } else {
            // A different color or dark frame flickered in, reset our validation check
            candidateState = immediateDetectedState;
            stabilityFramesCounter = 0;
        }
    }

    function triggerAlert(oldState, newState) {
        alertBox.style.display = 'block';
        
        if (newState === "DARK") {
            alertBox.style.backgroundColor = "#444444";
            alertBox.style.color = "#fff";
            alertBox.innerText = `⚠️ SIGNAL WENT OFF (From ${oldState})`;
        } else {
            switch(newState) {
                case "RED": alertBox.style.backgroundColor = "#dc3545"; alertBox.style.color = "#fff"; break;
                case "YELLOW": alertBox.style.backgroundColor = "#ffc107"; alertBox.style.color = "#000"; break;
                case "DOUBLE YELLOW": alertBox.style.backgroundColor = "#ff9f0a"; alertBox.style.color = "#000"; break;
                case "GREEN": alertBox.style.backgroundColor = "#28a745"; alertBox.style.color = "#fff"; break;
            }
            alertBox.innerText = `🚨 CHANGED TO ${newState}`;
        }

        // Play Beep
        alertSound.currentTime = 0;
        alertSound.play().catch(() => {});

        // Speak the alert text out loud
        let speechText = (newState === "DARK") 
            ? `Signal went off from ${oldState}` 
            : `Signal changed to ${newState}`;
            
        let utterance = new SpeechSynthesisUtterance(speechText);
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
