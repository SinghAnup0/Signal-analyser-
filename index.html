<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Traffic Light Signal Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #121214;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1c1c24;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 480px;
        }
        #video {
            width: 100%;
            border: 3px solid #333;
            border-radius: 8px;
            background-color: #000;
        }
        /* Reticle to help the user aim at the traffic light */
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 2px dashed #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .btn-container { margin: 20px 0; }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
        }
        .start { background-color: #2eb85c; color: white; }
        .stop { background-color: #e55353; color: white; }
        .btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        #status { font-size: 1.1em; color: #aaa; margin: 10px 0; }
        
        #alert-box {
            font-size: 26px;
            font-weight: bold;
            padding: 25px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>LED Signal Aspect Detector</h2>
    <p>Align the target circle directly over the LED aspect.</p>
    
    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="btn-container">
        <button class="btn start" id="startBtn" onclick="startMonitoring()">Start Monitoring</button>
        <button class="btn stop" id="stopBtn" onclick="stopMonitoring()" disabled>Stop / Interrupt</button>
    </div>

    <div id="status">Status: Idle</div>
    <div id="alert-box"></div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDiv = document.getElementById('status');
    const alertBox = document.getElementById('alert-box');
    const alertSound = document.getElementById('alertSound');

    let isMonitoring = false;
    let streamRef = null;
    let animationFrameId = null;
    let lastSpokenAspect = ""; 
    let aspectDurationCounter = 0; // Helps filter out flickering noise

    async function startMonitoring() {
        if (isMonitoring) return;
        isMonitoring = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusDiv.innerText = "Status: Accessing camera...";

        try {
            // Note: Removed mirror scaling (scaleX) to keep orientation true for physical layout tracking
            streamRef = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            video.srcObject = streamRef;
            statusDiv.innerText = "Status: Monitoring Signal Aspects...";
            analyzeFrame();
        } catch (err) {
            statusDiv.innerText = "Error: Camera unavailable.";
            resetUI();
        }
    }

    function stopMonitoring() {
        isMonitoring = false;
        statusDiv.innerText = "Status: Interrupted by User.";
        if (streamRef) streamRef.getTracks().forEach(track => track.stop());
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        alertSound.pause();
        alertBox.style.display = 'none';
        lastSpokenAspect = "";
        resetUI();
    }

    function resetUI() {
        isMonitoring = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }

    function analyzeFrame() {
        if (!isMonitoring) return;

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Define a small 10x10 pixel bounding area at the center to sample the light safely
            const size = 10;
            const startX = Math.floor(canvas.width / 2) - (size / 2);
            const startY = Math.floor(canvas.height / 2) - (size / 2);
            
            const imgData = ctx.getImageData(startX, startY, size, size).data;
            
            let totalR = 0, totalG = 0, totalB = 0;
            const pixelCount = imgData.length / 4;

            for (let i = 0; i < imgData.length; i += 4) {
                totalR += imgData[i];
                totalG += imgData[i+1];
                totalB += imgData[i+2];
            }

            // Average color inside our target reticle
            const r = totalR / pixelCount;
            const g = totalG / pixelCount;
            const b = totalB / pixelCount;

            processLEDAspect(r, g, b);
        }

        animationFrameId = requestAnimationFrame(analyzeFrame);
    }

    function processLEDAspect(r, g, b) {
        let currentAspect = "NONE";

        // Advanced color-ratio thresholds for intensely bright LED emissions
        if (r > 140 && g < 75 && b < 75) {
            currentAspect = "RED";
        } 
        else if (g > 140 && r < 90 && b < 120) {
            currentAspect = "GREEN";
        } 
        else if (r > 150 && g > 120 && b < 70) {
            // For standard Yellow/Orange
            currentAspect = "YELLOW";
        }

        // --- DOUBLE YELLOW LOGIC (Mainly used in Railway Systems) ---
        // If your "Double Yellow" physical setup involves two vertical lights, 
        // a single center point won't see both. If it implies an ultra-bright localized 
        // high-intensity amber hue, we handle it here by reading the brightness magnitude:
        if (currentAspect === "YELLOW" && (r + g) > 420) {
            currentAspect = "DOUBLE YELLOW";
        }

        // Aspect stability check (must persist for 3 frames to avoid false triggers from camera noise)
        if (currentAspect !== "NONE") {
            aspectDurationCounter++;
            if (aspectDurationCounter >= 3) {
                triggerAlert(currentAspect);
            }
        } else {
            aspectDurationCounter = 0;
            alertBox.style.display = 'none';
        }
    }

    function triggerAlert(aspect) {
        alertBox.style.display = 'block';
        
        switch(aspect) {
            case "RED":
                alertBox.style.backgroundColor = "#dc3545";
                alertBox.style.color = "#fff";
                alertBox.innerText = "🚨 RED ASPECT";
                break;
            case "YELLOW":
                alertBox.style.backgroundColor = "#ffc107";
                alertBox.style.color = "#000";
                alertBox.innerText = "⚠️ SINGLE YELLOW ASPECT";
                break;
            case "DOUBLE YELLOW":
                alertBox.style.backgroundColor = "#ff9f0a";
                alertBox.style.color = "#000";
                alertBox.innerText = "⚠️⚠️ DOUBLE YELLOW ASPECT";
                break;
            case "GREEN":
                alertBox.style.backgroundColor = "#28a745";
                alertBox.style.color = "#fff";
                alertBox.innerText = "🍏 GREEN ASPECT";
                break;
        }

        // VOICE ALERT: Speaks the aspect out loud whenever it changes!
        if (lastSpokenAspect !== aspect) {
            lastSpokenAspect = aspect;
            
            // Play quick chime sound
            alertSound.play().catch(() => {});

            // Speak the state aloud so the user doesn't have to look at the screen
            let speechString = aspect + " Signal Detected";
            let utterance = new SpeechSynthesisUtterance(speechString);
            utterance.rate = 1.1;
            window.speechSynthesis.speak(utterance);
        }
    }
</script>
</body>
</html>
