<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Debugger</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #121214; color: #fff; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: 0 auto; background: #1c1c24; padding: 15px; border-radius: 12px; }
        #video { width: 100%; border-radius: 8px; background: #000; }
        .btn { padding: 10px 15px; margin: 5px; cursor: pointer; border: none; border-radius: 15px; font-weight: bold; }
        #debug-log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 12px; text-align: left; margin-top: 10px; height: 80px; overflow-y: scroll; border-radius: 5px; }
        #alert-box { display: none; padding: 10px; background: #dc3545; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h3>Signal Tracker</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div>
        <button class="btn" onclick="startTracking()">Start</button>
        <button class="btn" onclick="stopTracking()">Stop</button>
        <button class="btn" id="muteBtn" onclick="toggleMute()">Mute: OFF</button>
        <button class="btn" onclick="resetTracker()">Reset</button>
    </div>

    <div id="alert-box">⚠️ SIGNAL CHANGED!</div>
    <div id="debug-log">Logs will appear here...</div>
</div>

<script>
    const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const log = document.getElementById('debug-log'), muteBtn = document.getElementById('muteBtn');
    let isMuted = false, isTracking = false, isRedActive = false;

    function toggleMute() {
        isMuted = !isMuted;
        muteBtn.textContent = isMuted ? "Mute: ON" : "Mute: OFF";
    }

    function addLog(msg) {
        log.innerHTML = msg + "<br>" + log.innerHTML;
    }

    async function startTracking() {
        isTracking = true;
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        analyze();
    }

    function analyze() {
        if (!isTracking) return;
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img = ctx.getImageData(canvas.width/2 - 10, canvas.height/2 - 10, 20, 20).data;
        let r=0, g=0, b=0;
        for (let i=0; i<img.length; i+=4) { r+=img[i]; g+=img[i+1]; b+=img[i+2]; }
        r /= (img.length/4); g /= (img.length/4); b /= (img.length/4);

        // Debug Log display
        addLog(`R:${Math.round(r)} G:${Math.round(g)} B:${Math.round(b)}`);

        // Detection Logic: A Yellow signal has high Red and high Green.
        // If Red is no longer significantly greater than Green, it's not "Red".
        let isRed = (r > 70 && (r - g) > 20); 

        if (isRed && !isRedActive) isRedActive = true;
        else if (!isRed && isRedActive) {
            isRedActive = false;
            triggerAlert();
        }

        requestAnimationFrame(analyze);
    }

    function triggerAlert() {
        document.getElementById('alert-box').style.display = 'block';
        if (!isMuted) {
            speechSynthesis.speak(new SpeechSynthesisUtterance("Signal changed"));
        }
    }

    function resetTracker() { document.getElementById('alert-box').style.display = 'none'; isRedActive = true; }
    function stopTracking() { isTracking = false; }
</script>
</body>
</html>
