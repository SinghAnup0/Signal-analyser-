<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Signal Transition Detector</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #121214;
            color: #fff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #1c1c24;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .video-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 480px;
        }
        #video {
            width: 100%;
            border: 3px solid #333;
            border-radius: 8px;
            background-color: #000;
        }
        .reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            border: 2px dashed #00ffff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .btn-container { margin: 20px 0; }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
        }
        .start { background-color: #2eb85c; color: white; }
        .stop { background-color: #e55353; color: white; }
        .btn:disabled { background-color: #444; color: #888; cursor: not-allowed; }
        
        #status { font-size: 1.1em; color: #aaa; margin: 10px 0; }
        
        #alert-box {
            font-size: 24px;
            font-weight: bold;
            padding: 25px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        #history {
            margin-top: 20px;
            text-align: left;
            background: #2a2a35;
            padding: 15px;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Signal Aspect Change Detector</h2>
    <p>Aims the reticle at the LED. Alerts trigger only when the aspect transitions.</p>
    
    <div class="video-wrapper">
        <video id="video" autoplay playsinline></video>
        <div class="reticle"></div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>

    <div class="btn-container">
        <button class="btn start" id="startBtn" onclick="startMonitoring()">Start Monitoring</button>
        <button class="btn stop" id="stopBtn" onclick="stopMonitoring()" disabled>Stop / Interrupt</button>
    </div>

    <div id="status">Status: Idle</div>
    <div id="alert-box"></div>
    
    <div id="history"><strong>Transition Log:</strong><br></div>
</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const statusDiv = document.getElementById('status');
    const alertBox = document.getElementById('alert-box');
    const alertSound = document.getElementById('alertSound');
    const historyDiv = document.getElementById('history');

    let isMonitoring = false;
    let streamRef = null;
    let animationFrameId = null;

    // --- State Machine Variables ---
    let currentStableAspect = "UNKNOWN"; 
    let pendingAspect = "NONE";
    let stabilityCounter = 0;
    const FRAMES_TO_CONFIRM = 5; // Signal must be stable for 5 frames (~80ms) to log a change

    async function startMonitoring() {
        if (isMonitoring) return;
        isMonitoring = true;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        statusDiv.innerText = "Status: Accessing camera...";

        try {
            streamRef = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } } 
            });
            video.srcObject = streamRef;
            statusDiv.innerText = "Status: Running. Awaiting initial state...";
            analyzeFrame();
        } catch (err) {
            statusDiv.innerText = "Error: Camera unavailable.";
            resetUI();
        }
    }

    function stopMonitoring() {
        isMonitoring = false;
        statusDiv.innerText = "Status: Interrupted by User.";
        if (streamRef) streamRef.getTracks().forEach(track => track.stop());
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        
        alertSound.pause();
        alertBox.style.display = 'none';
        currentStableAspect = "UNKNOWN";
        resetUI();
    }

    function resetUI() {
        isMonitoring = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
    }

    function analyzeFrame() {
        if (!isMonitoring) return;

        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Sample center 10x10 area
            const size = 10;
            const startX = Math.floor(canvas.width / 2) - (size / 2);
            const startY = Math.floor(canvas.height / 2) - (size / 2);
            const imgData = ctx.getImageData(startX, startY, size, size).data;
            
            let totalR = 0, totalG = 0, totalB = 0;
            const pixelCount = imgData.length / 4;

            for (let i = 0; i < imgData.length; i += 4) {
                totalR += imgData[i];
                totalG += imgData[i+1];
                totalB += imgData[i+2];
            }

            const r = totalR / pixelCount;
            const g = totalG / pixelCount;
            const b = totalB / pixelCount;

            detectRawColor(r, g, b);
        }

        animationFrameId = requestAnimationFrame(analyzeFrame);
    }

    function detectRawColor(r, g, b) {
        let rawAspect = "OFF/DARK";

        // Balanced color thresholds for high-output LED emitters
        if (r > 130 && g < 75 && b < 75) {
            rawAspect = "RED";
        } 
        else if (g > 130 && r < 95 && b < 120) {
            rawAspect = "GREEN";
        } 
        else if (r > 140 && g > 115 && b < 70) {
            // Bright amber profile
            rawAspect = (r + g > 410) ? "DOUBLE YELLOW" : "YELLOW";
        }

        // --- State Machine Filter ---
        if (rawAspect === pendingAspect) {
            stabilityCounter++;
            if (stabilityCounter >= FRAMES_TO_CONFIRM) {
                // Check if it is a brand new change
                if (currentStableAspect !== pendingAspect) {
                    handleAspectChange(currentStableAspect, pendingAspect);
                    currentStableAspect = pendingAspect;
                }
            }
        } else {
            pendingAspect = rawAspect;
            stabilityCounter = 0;
        }
    }

    function handleAspectChange(oldState, newState) {
        // We only want alerts when transitioning TO an active signal state
        if (newState === "OFF/DARK" || newState === "UNKNOWN") {
            alertBox.style.display = 'none';
            return;
        }

        // Update visual warning UI
        alertBox.style.display = 'block';
        let uiText = "";
        
        switch(newState) {
            case "RED":
                alertBox.style.backgroundColor = "#dc3545"; alertBox.style.color = "#fff";
                uiText = "🚨 CHANGED TO RED"; break;
            case "YELLOW":
                alertBox.style.backgroundColor = "#ffc107"; alertBox.style.color = "#000";
                uiText = "⚠️ CHANGED TO YELLOW"; break;
            case "DOUBLE YELLOW":
                alertBox.style.backgroundColor = "#ff9f0a"; alertBox.style.color = "#000";
                uiText = "⚠️⚠️ CHANGED TO DOUBLE YELLOW"; break;
            case "GREEN":
                alertBox.style.backgroundColor = "#28a745"; alertBox.style.color = "#fff";
                uiText = "🍏 CHANGED TO GREEN"; break;
        }
        
        alertBox.innerText = uiText;

        // Log the change dynamically on-screen
        const timestamp = new Date().toLocaleTimeString();
        historyDiv.innerHTML += `[${timestamp}] State changed: ${oldState} ➔ ${newState}<br>`;
        historyDiv.scrollTop = historyDiv.scrollHeight;

        // Execute Audio Alerts
        alertSound.currentTime = 0;
        alertSound.play().catch(() => {});

        // Speak the transition aloud clearly
        let speechString = `Signal changed to ${newState}`;
        let utterance = new SpeechSynthesisUtterance(speechString);
        utterance.rate = 1.15;
        window.speechSynthesis.speak(utterance);
    }
</script>
</body>
</html>
