<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-Signal Tracker</title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #fff; text-align: center; }
        .container { max-width: 600px; margin: auto; padding: 10px; }
        #video { width: 100%; border-radius: 8px; background: #000; }
        .btn { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 15px; border: none; font-weight: bold; }
        #debug-log { background: #000; color: #0f0; font-family: monospace; font-size: 11px; height: 100px; overflow-y: scroll; text-align: left; padding: 5px; margin-top: 10px; }
        #alert-box { display: none; background: #dc3545; padding: 20px; font-size: 20px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h3>Multi-Signal Scanner</h3>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div>
        <button class="btn" onclick="startTracking()">Start</button>
        <button class="btn" onclick="toggleMute()" id="muteBtn">Mute: OFF</button>
        <button class="btn" onclick="resetTracker()">Reset Alert</button>
    </div>
    <div id="alert-box">⚠️ SIGNAL CHANGED!</div>
    <div id="debug-log">Scanning frame...</div>
</div>

<script>
    const video = document.getElementById('video'), canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const log = document.getElementById('debug-log'), alertBox = document.getElementById('alert-box');
    let isTracking = false, isMuted = false, wasRedDetected = false;

    async function startTracking() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        isTracking = true;
        scan();
    }

    function scan() {
        if (!isTracking) return;
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        
        // Grid scanning: Scan 10x10 sections of the screen to find ANY red signal
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let redFoundInFrame = false;

        for (let i = 0; i < imageData.length; i += 400) { // Step size = 100 pixels for speed
            let r = imageData[i], g = imageData[i+1], b = imageData[i+2];
            // Define Red: High red intensity, low green/blue
            if (r > 150 && g < 100 && b < 100) {
                redFoundInFrame = true;
                break; // Found at least one red signal
            }
        }

        updateState(redFoundInFrame);
        requestAnimationFrame(scan);
    }

    function updateState(isRed) {
        if (isRed && !wasRedDetected) {
            wasRedDetected = true;
            log.innerHTML = "Status: Red Signal Detected<br>" + log.innerHTML;
        } else if (!isRed && wasRedDetected) {
            wasRedDetected = false;
            triggerAlert();
        }
    }

    function triggerAlert() {
        alertBox.style.display = 'block';
        if (!isMuted) {
            speechSynthesis.speak(new SpeechSynthesisUtterance("Signal changed"));
        }
        log.innerHTML = "<span style='color:red'>ALERT: Signal Lost!</span><br>" + log.innerHTML;
    }

    function resetTracker() { alertBox.style.display = 'none'; wasRedDetected = true; }
    function toggleMute() { isMuted = !isMuted; document.getElementById('muteBtn').innerText = isMuted ? "Mute: ON" : "Mute: OFF"; }
</script>
</body>
</html>
